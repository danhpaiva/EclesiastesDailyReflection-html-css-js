name: CI / Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Job 1: Validate ──────────────────────────────────────────────────────
  validate:
    name: Validate static assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          for f in index.html assets/css/style.css assets/js/app.js assets/js/render.js assets/js/data.js assets/js/animations.js assets/js/theme.js assets/js/focus.js; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f" && exit 1
            fi
          done
          echo "All required files present."

      - name: Lint HTML (htmlhint)
        run: |
          npm install -g htmlhint --silent
          htmlhint index.html

      - name: Check for JS syntax errors
        run: |
          for f in assets/js/app.js assets/js/render.js assets/js/animations.js assets/js/theme.js assets/js/focus.js; do
            node --check "$f"
          done
          echo "JS syntax OK."

  # ── Job 2: Deploy to GitHub Pages (only on push to main) ─────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
