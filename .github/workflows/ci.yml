name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate static assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          for f in index.html assets/css/style.css assets/js/app.js assets/js/render.js assets/js/data.js assets/js/animations.js assets/js/theme.js assets/js/focus.js; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f" && exit 1
            fi
          done
          echo "All required files present."

      - name: Lint HTML (htmlhint)
        run: |
          npm install -g htmlhint --silent
          htmlhint index.html

      - name: Check for JS syntax errors
        run: |
          for f in assets/js/app.js assets/js/render.js assets/js/animations.js assets/js/theme.js assets/js/focus.js; do
            node --check "$f"
          done
          echo "JS syntax OK."
