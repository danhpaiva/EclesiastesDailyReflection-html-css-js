<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reflexão diária do livro de Eclesiastes com comentários de teologia reformada." />
  <title>Eclesiastes — Reflexão Diária</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400&display=swap" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <canvas id="grain" aria-hidden="true"></canvas>
  <div id="progress-bar" aria-hidden="true"></div>

  <div id="app">
    <header class="site-header">
      <div class="site-header-top">
        <div class="site-header-text">
          <span class="site-label">Eclesiastes</span>
          <span class="site-sub">Reflexão Diária</span>
        </div>
        <button class="btn-theme" id="btn-theme" aria-label="Alternar tema">
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="card" id="reflection-card" aria-live="polite">
      <div class="card-meta">
        <span class="day-label" id="day-label"></span>
        <span class="reference" id="reference"></span>
        <button class="btn-focus" id="btn-focus" aria-label="Ativar modo foco" title="Modo foco">
          <svg class="icon-expand" xmlns="http://www.w3.org/2000/svg" width="15" height="15"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
          <svg class="icon-compress" xmlns="http://www.w3.org/2000/svg" width="15" height="15"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
          </svg>
        </button>
      </div>

      <blockquote class="verse" id="verse"></blockquote>

      <div class="divider" aria-hidden="true">
        <svg viewBox="0 0 200 12" xmlns="http://www.w3.org/2000/svg" class="divider-ornament">
          <line x1="0" y1="6" x2="80" y2="6" stroke="currentColor" stroke-width="0.5"/>
          <circle cx="100" cy="6" r="2" fill="currentColor"/>
          <circle cx="92" cy="6" r="1" fill="currentColor" opacity="0.5"/>
          <circle cx="108" cy="6" r="1" fill="currentColor" opacity="0.5"/>
          <line x1="120" y1="6" x2="200" y2="6" stroke="currentColor" stroke-width="0.5"/>
        </svg>
      </div>

      <section class="commentary" id="commentary"></section>
    </main>

    <footer class="site-footer">
      <div class="footer-actions">
        <nav class="day-nav" aria-label="Navegar entre dias">
          <button class="btn-nav" id="btn-prev" aria-label="Dia anterior">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round" aria-hidden="true">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            Anterior
          </button>

          <button class="btn-nav btn-today" id="btn-today" aria-label="Voltar para hoje">
            Hoje
          </button>

          <button class="btn-nav" id="btn-next" aria-label="Próximo dia">
            Próximo
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round" aria-hidden="true">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </nav>

        <button class="btn-share" id="btn-share" aria-label="Compartilhar reflexão de hoje">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          Compartilhar
        </button>
      </div>

      <p class="footer-note">
        &ldquo;Vaidade das vaidades, diz o pregador, tudo é vaidade.&rdquo; — Ec 1.2
      </p>
    </footer>
  </div>

  <script type="module" src="assets/js/app.js"></script>
  <script type="module" src="assets/js/animations.js"></script>
</body>
</html>
